<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="css/animations.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceHub — Personal & Business Finance</title>
<link rel="stylesheet" href="css/finance.css">
</head>
<body class="auth-page">
<div class="auth-container">
<div class="auth-card">
<div class="auth-logo">
<span class="logo-icon">💰</span>
<h1>FinanceHub</h1>
<p>Personal & Business Finance Management</p>
</div>
<div id="login-form" class="auth-form">
<h2>Sign In</h2>
<div class="form-group">
<label>Email</label>
<input type="email" id="login-email" placeholder="you@email.com" required>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="login-password" placeholder="••••••••" required>
</div>
<div class="form-row">
<label class="checkbox"><input type="checkbox" id="remember-me"> Remember me</label>
<a href="#" class="forgot-link">Forgot password?</a>
</div>
<button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
<div class="auth-divider"><span>or</span></div>
<button class="btn btn-outline btn-full" onclick="showSignup()">Create Account</button>
<div id="login-error" class="error-msg"></div>
</div>
<div id="signup-form" class="auth-form" style="display:none">
<h2>Create Account</h2>
<div class="form-group">
<label>Full Name</label>
<input type="text" id="signup-name" placeholder="Arfeen Ahmad" required>
</div>
<div class="form-group">
<label>Email</label>
<input type="email" id="signup-email" placeholder="you@email.com" required>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="signup-password" placeholder="••••••••" required oninput="checkStrength()">
<div class="password-strength"><div id="strength-bar" class="strength-bar"></div></div>
<small id="strength-text" class="strength-text"></small>
</div>
<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="signup-confirm" placeholder="••••••••" required>
</div>
<button class="btn btn-primary btn-full" onclick="doSignup()">Create Account</button>
<div class="auth-divider"><span>or</span></div>
<button class="btn btn-outline btn-full" onclick="showLogin()">Sign In Instead</button>
<div id="signup-error" class="error-msg"></div>
</div>
</div>
<div class="auth-footer">
<p>🔒 Your data stays on your device. Bank-level security.</p>
</div>
</div>
<script src="js/finance.js"></script>
<script>
function showLogin(){document.getElementById('login-form').style.display='block';document.getElementById('signup-form').style.display='none';}
function showSignup(){document.getElementById('login-form').style.display='none';document.getElementById('signup-form').style.display='block';}
function doLogin(){
const email=document.getElementById('login-email').value;
const password=document.getElementById('login-password').value;
const user=FinanceApp.login(email,password);
if(user){window.location.href='entities.html';}
else{document.getElementById('login-error').textContent='Invalid email or password';}
}
function doSignup(){
const name=document.getElementById('signup-name').value;
const email=document.getElementById('signup-email').value;
const password=document.getElementById('signup-password').value;
const confirm=document.getElementById('signup-confirm').value;
if(password!==confirm){document.getElementById('signup-error').textContent='Passwords do not match';return;}
if(password.length<8){document.getElementById('signup-error').textContent='Password must be at least 8 characters';return;}
const user=FinanceApp.signup(email,password,name);
if(user){window.location.href='entities.html';}
else{document.getElementById('signup-error').textContent='Email already exists';}
}
function checkStrength(){
const p=document.getElementById('signup-password').value;
const bar=document.getElementById('strength-bar');
const text=document.getElementById('strength-text');
let s=0;if(p.length>=8)s++;if(p.length>=12)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
const colors=['#ef4444','#f59e0b','#f59e0b','#22c55e','#22c55e'];
const labels=['Very Weak','Weak','Fair','Strong','Very Strong'];
bar.style.width=(s*20)+'%';bar.style.background=colors[s-1]||'#ef4444';
text.textContent=labels[s-1]||'';text.style.color=colors[s-1]||'#ef4444';
}
if(FinanceApp.currentUser())window.location.href='entities.html';
</script>
<script src="js/scroll-reveal.js"></script>
</body>
</html>
