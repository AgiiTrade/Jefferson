<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - StudyCanada Portal</title>
  <link rel="stylesheet" href="css/portal.css">
  <style>
    body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div class="login-page">
    <div>
      <div class="login-card">
        <div class="login-logo">
          <h1>🍁 Study<span>Canada</span></h1>
          <p>Sign in to your Student Portal</p>
        </div>

        <!-- Google Sign In -->
        <button class="login-social-btn" id="googleLogin">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <!-- Guest Login -->
        <button class="login-social-btn" id="guestLogin">
          👤 Continue as Guest
        </button>

        <div class="login-divider"><span>or sign in with email</span></div>

        <!-- Email Form -->
        <form id="emailLoginForm">
          <div class="form-group">
            <input type="email" placeholder="Email address" id="loginEmail" required>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Password" id="loginPassword" required>
          </div>
          <button type="submit" class="login-submit">Sign In</button>
        </form>

        <!-- Sign Up Toggle -->
        <div class="login-divider"><span>or create an account</span></div>

        <form id="signupForm">
          <div class="form-group">
            <input type="text" placeholder="Full Name" id="signupName" required>
          </div>
          <div class="form-group">
            <input type="email" placeholder="Email address" id="signupEmail" required>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Password (min 6 characters)" id="signupPassword" required minlength="6">
          </div>
          <button type="submit" class="login-submit" style="background:#1B365D;">Create Account</button>
        </form>

        <div class="login-footer">
          By signing in, you agree to our <a href="../terms.html">Terms</a> and <a href="../privacy.html">Privacy Policy</a>
        </div>
      </div>

      <div class="login-back">
        <a href="../index.html">← Back to StudyCanada</a>
      </div>
    </div>
  </div>

  <script>
    // Simple local auth (Firebase integration placeholder)
    function getLocalUsers() {
      try { return JSON.parse(localStorage.getItem('portal_users')) || []; } catch { return []; }
    }

    function saveLocalUsers(users) {
      localStorage.setItem('portal_users', JSON.stringify(users));
    }

    function doLogin(user) {
      localStorage.setItem('portal_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }

    // Check if already logged in
    if (localStorage.getItem('portal_user')) {
      window.location.href = 'dashboard.html';
    }

    // Email Login
    document.getElementById('emailLoginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const users = getLocalUsers();
      const user = users.find(u => u.email === email && u.password === password);
      if (user) {
        doLogin({ name: user.name, email: user.email, uid: user.uid });
      } else {
        alert('Invalid email or password. Please sign up first or try again.');
      }
    });

    // Sign Up
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const users = getLocalUsers();
      if (users.find(u => u.email === email)) {
        alert('An account with this email already exists. Please sign in.');
        return;
      }
      const uid = 'user_' + Date.now();
      users.push({ name, email, password, uid });
      saveLocalUsers(users);
      doLogin({ name, email, uid });
    });

    // Guest Login
    document.getElementById('guestLogin').addEventListener('click', function() {
      doLogin({ name: 'Guest Student', email: '', uid: 'guest_' + Date.now() });
    });

    // Google Login (simulated - Firebase placeholder)
    document.getElementById('googleLogin').addEventListener('click', function() {
      const name = prompt('Enter your name (Google auth simulation):');
      if (name) {
        doLogin({ name: name, email: name.toLowerCase().replace(/\s/g,'.') + '@gmail.com', uid: 'google_' + Date.now() });
      }
    });
  </script>
</body>
</html>
