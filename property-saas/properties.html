<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="css/animations.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties — RentBoss</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">🏠 Rent<span>Boss</span></a>
    <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="properties.html" class="active">Properties</a></li>
      <li><a href="tenants.html">Tenants</a></li>
      <li><a href="finances.html">Finances</a></li>
      <li><a href="maintenance.html">Maintenance</a></li>
      <li><a href="reports.html">Reports</a></li>
    </ul>
  </nav>

  <main class="main">
    <div class="page-header">
      <h1>🏢 Properties</h1>
      <button class="btn btn-primary" onclick="openModal()">+ Add Property</button>
    </div>

    <div id="propertiesList"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="propertyModal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Add Property</h2>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="form-row">
            <div class="form-group">
              <label>Property Name</label>
              <input type="text" class="form-control" id="propName" placeholder="e.g. Maple Heights">
            </div>
            <div class="form-group">
              <label>Property Type</label>
              <select class="form-control" id="propType">
                <option value="apartment">Apartment</option>
                <option value="condo">Condo</option>
                <option value="townhouse">Townhouse</option>
                <option value="house">House</option>
                <option value="commercial">Commercial</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" class="form-control" id="propAddress" placeholder="Full address">
          </div>
          <div class="card-header" style="margin-top: 16px;"><h3>Units</h3>
            <button class="btn btn-outline btn-sm" onclick="addUnitRow()">+ Add Unit</button>
          </div>
          <div id="unitsContainer"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveProperty()">Save Property</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/property.js"></script>
  <script>
    let unitCounter = 0;

    function renderProperties() {
      const props = RentBoss.getProperties();
      if (props.length === 0) {
        document.getElementById('propertiesList').innerHTML = `
          <div class="card empty-state">
            <div class="icon">🏢</div>
            <p>No properties yet. Add your first property to get started.</p>
            <button class="btn btn-primary" onclick="openModal()">+ Add Property</button>
          </div>`;
        return;
      }

      document.getElementById('propertiesList').innerHTML = props.map(p => {
        const units = p.units || [];
        const occupied = units.filter(u => RentBoss.getActiveLease(p.id, u.id)).length;
        const revenue = RentBoss.getPropertyRevenue(p.id, 2026, 3);
        return `
          <div class="card" style="margin-bottom: 16px;">
            <div class="card-header">
              <div>
                <h2>${p.name}</h2>
                <span style="color: var(--text-muted); font-size: 0.85rem;">${p.address} • ${p.type}</span>
              </div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-outline btn-sm" onclick="editProperty('${p.id}')">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteProperty('${p.id}')">🗑️</button>
              </div>
            </div>
            <div class="stats-grid" style="margin-bottom: 12px;">
              <div class="stat-card" style="padding: 12px;">
                <div class="stat-label">Units</div>
                <div class="stat-value" style="font-size: 1.4rem;">${units.length}</div>
              </div>
              <div class="stat-card navy" style="padding: 12px;">
                <div class="stat-label">Occupied</div>
                <div class="stat-value" style="font-size: 1.4rem;">${occupied}/${units.length}</div>
              </div>
              <div class="stat-card accent" style="padding: 12px;">
                <div class="stat-label">March Revenue</div>
                <div class="stat-value" style="font-size: 1.4rem;">${RentBoss.formatCurrency(revenue)}</div>
              </div>
            </div>
            ${units.length > 0 ? `
            <div class="table-wrap">
              <table>
                <thead><tr><th>Unit</th><th>Type</th><th>Rent</th><th>Tenant</th><th>Status</th></tr></thead>
                <tbody>
                  ${units.map(u => {
                    const lease = RentBoss.getActiveLease(p.id, u.id);
                    const tenant = lease ? RentBoss.getTenant(lease.tenantId) : null;
                    return `<tr>
                      <td><strong>${u.name}</strong></td>
                      <td>${u.beds}-bed / ${u.baths}-bath</td>
                      <td>${RentBoss.formatCurrency(u.rent)}/mo</td>
                      <td>${tenant ? tenant.firstName + ' ' + tenant.lastName : '—'}</td>
                      <td><span class="badge ${lease ? 'badge-success' : 'badge-danger'}">${lease ? 'Occupied' : 'Vacant'}</span></td>
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>` : '<p style="color: var(--text-muted); padding: 12px 0;">No units added yet.</p>'}
          </div>`;
      }).join('');
    }

    function addUnitRow(unit = {}) {
      const id = unitCounter++;
      const container = document.getElementById('unitsContainer');
      const div = document.createElement('div');
      div.style.cssText = 'display: grid; grid-template-columns: 1fr 80px 80px 100px 36px; gap: 8px; margin-bottom: 8px; align-items: end;';
      div.id = `unit_${id}`;
      div.innerHTML = `
        <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Unit Name</label><input type="text" class="form-control unit-name" value="${unit.name||''}" placeholder="e.g. Unit 101"></div>
        <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Beds</label><input type="number" class="form-control unit-beds" value="${unit.beds||1}" min="0"></div>
        <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Baths</label><input type="number" class="form-control unit-baths" value="${unit.baths||1}" min="0" step="0.5"></div>
        <div class="form-group" style="margin:0"><label style="font-size:0.75rem">Rent $</label><input type="number" class="form-control unit-rent" value="${unit.rent||''}" placeholder="2000"></div>
        <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()" style="margin-bottom:0">✕</button>`;
      container.appendChild(div);
    }

    function getUnitsFromForm() {
      return Array.from(document.querySelectorAll('#unitsContainer > div')).map(div => ({
        id: RentBoss.genId(),
        name: div.querySelector('.unit-name').value,
        beds: parseInt(div.querySelector('.unit-beds').value) || 1,
        baths: parseFloat(div.querySelector('.unit-baths').value) || 1,
        rent: parseFloat(div.querySelector('.unit-rent').value) || 0,
      })).filter(u => u.name);
    }

    function openModal(id) {
      document.getElementById('propertyModal').classList.add('active');
      document.getElementById('unitsContainer').innerHTML = '';
      unitCounter = 0;
      if (id) {
        const p = RentBoss.getProperty(id);
        document.getElementById('modalTitle').textContent = 'Edit Property';
        document.getElementById('editId').value = id;
        document.getElementById('propName').value = p.name;
        document.getElementById('propType').value = p.type;
        document.getElementById('propAddress').value = p.address;
        (p.units || []).forEach(u => addUnitRow(u));
      } else {
        document.getElementById('modalTitle').textContent = 'Add Property';
        document.getElementById('editId').value = '';
        document.getElementById('propName').value = '';
        document.getElementById('propType').value = 'apartment';
        document.getElementById('propAddress').value = '';
        addUnitRow();
      }
    }

    function closeModal() {
      document.getElementById('propertyModal').classList.remove('active');
    }

    function saveProperty() {
      const name = document.getElementById('propName').value.trim();
      if (!name) return alert('Property name is required');
      const data = {
        id: document.getElementById('editId').value || undefined,
        name,
        type: document.getElementById('propType').value,
        address: document.getElementById('propAddress').value.trim(),
        units: getUnitsFromForm(),
      };
      RentBoss.saveProperty(data);
      closeModal();
      renderProperties();
    }

    function editProperty(id) { openModal(id); }
    function deleteProperty(id) {
      if (confirm('Delete this property and all associated data?')) {
        RentBoss.deleteProperty(id);
        renderProperties();
      }
    }

    document.addEventListener('DOMContentLoaded', renderProperties);
  </script>
<script src="js/scroll-reveal.js"></script>
</body>
</html>
